<main class="page">
  <section class="hero">
    <h1>Edit carbon emission record</h1>
    <p>Update an existing CO₂ emission record.</p>
  </section>

  <section class="status">
    <p *ngIf="loading">Loading...</p>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
    <p *ngIf="successMessage" class="success">{{ successMessage }}</p>
  </section>

  <form
    class="edit-form"
    *ngIf="!loading"
    (ngSubmit)="updateRecord()"
  >
    <div class="field">
      <label for="location">Location</label>

      <input
        id="location"
        type="text"
        [(ngModel)]="locations"
        list="editRecordLocations"
        placeholder="Example: Spain and Andorra"
      />

      <datalist id="editRecordLocations">
        <option *ngFor="let locationOption of locations" [value]="locationOption"></option>
      </datalist>

      <p class="field-help">
        You can select an existing location or type a new one.
      </p>
    </div>

    <div class="field">
      <label for="period">Year</label>
      <input
        id="period"
        name="period"
        type="number"
        [(ngModel)]="recordToEdit.period"
        [min]="minPeriod"
        [max]="maxPeriod"
        required
      />
    </div>

    <div class="field">
      <label for="totalEmissionsMt">Total emissions Mt</label>
      <input
        id="totalEmissionsMt"
        name="totalEmissionsMt"
        type="number"
        step="0.001"
        [(ngModel)]="recordToEdit.totalEmissionsMt"
        required
      />
    </div>

    <div class="field">
      <label for="emissionsIntensity">Intensity</label>
      <input
        id="emissionsIntensity"
        name="emissionsIntensity"
        type="number"
        step="0.01"
        [(ngModel)]="recordToEdit.emissionsIntensity"
        placeholder="Leave empty if unavailable"
      />
    </div>

    <div class="field">
      <label for="emissionsPerCapita">Per capita</label>
      <input
        id="emissionsPerCapita"
        name="emissionsPerCapita"
        type="number"
        step="0.01"
        [(ngModel)]="recordToEdit.emissionsPerCapita"
        required
      />
    </div>

    <div class="field">
      <label for="annualVariation">Annual variation</label>
      <input
        id="annualVariation"
        name="annualVariation"
        type="number"
        step="0.01"
        [(ngModel)]="recordToEdit.annualVariation"
        placeholder="Leave empty if unavailable"
      />
    </div>

    <div class="actions">
      <button type="submit" [disabled]="loading">Save changes</button>

      <a routerLink="/" class="button-link secondary">
        Cancel
      </a>
    </div>
  </form>
</main>
